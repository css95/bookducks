<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Book Ducks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js" defer></script>
    <script src="js/config.js" defer></script>
    <script src="js/theme.js" defer></script>
    <script src="js/nav.js" defer></script> 
    <script src="js/admin.js" defer></script>
</head>

<body class="theme-warm">
    <header>
        <h1><a href="index.html">Book Ducks</a></h1>
        <nav id="main-nav">
            <a href="index.html">Books</a>
            <span id="nav-auth"></span>
        </nav>
    </header>

    <main>
        <section class="admin">
            <h2>Add a New Book</h2>
            
            <form id="admin-form" class="admin-form">
                <div class="form-group">
                    <label for="book-title">Title</label>
                    <input type="text" id="book-title" name="title" required>
                </div>

                <div class="form-group">
                    <label for="book-author">Author</label>
                    <input type="text" id="book-author" name="author" required>
                </div>

                <div class="form-group">
                    <label for="book-pages">Number of pages</label>
                    <input type="number" id="book-pages" name="pages" min="1" required>
                </div>

                <div class="form-group">
                    <label for="book-date">Publication date</label>
                    <input type="date" id="book-date" name="publishedDate" required>
                </div>

                <div class="form-group">
                    <label for="book-cover">Cover image</label>
                    <input type="file" id="book-cover" name="cover" accept="image/*" required>
                </div>

                <p class="form-error" id="form-error"></p>
                <p class="form-success" id="form-success"></p>

                <button type="submit" class="btn btn--primary">Add Book</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <p>© 2026 Book Ducks.</p>
    </footer>
    
</body>
</html>
