<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Book Ducks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js" defer></script>
    <script src="js/config.js" defer></script>
    <script src="js/theme.js" defer></script>
    <script src="js/nav.js" defer></script> 
    <script src="js/login.js" defer></script>
</head>

<body class="theme-warm">
    <header>
        <h1><a href="index.html">Book Ducks</a></h1>
        <nav id="main-nav">
            <a href="index.html">Books</a>
            <span id="nav-auth"></span>
        </nav>
    </header>

    <main>
        <section class="auth-form">
            <h2>Login</h2>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="identifier">Email or Username</label>
                    <input type="text" id="identifier" name="identifier" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <p class="form-error" id="form-error"></p>
                
                <button type="submit" class="btn btn--primary">Log In</button>
                
                <p class="form-footer">
                    Don't have an account? <a href="register.html">Register here</a>
                </p>
            </form>
        </section>
    </main>
</body>
</html>
