<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile · Book Ducks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js" defer></script>
    <script src="js/config.js" defer></script>
    <script src="js/theme.js" defer></script>
    <script src="js/nav.js" defer></script> 
    <script src="js/profile.js" defer></script>
</head>

<body class="theme-warm">
    <header>
        <h1><a href="index.html">Book Ducks</a></h1>
        <nav id="main-nav">
            <a href="index.html">Books</a>
            <span id="nav-auth"></span>
        </nav>
    </header>

    <main>
        <section class="profile">
            <h2 id="profile-greeting">My Profile</h2>
            
            <section class="profile__section">
                <div class="profile__list-header">
                    <h3>Want to Read</h3>
                    <div class="profile__sort">
                        <label for="sort-saved-books">Sort by:</label>
                        <select id="sort-saved-books">
                            <option value="title">Title</option>
                            <option value="author">Author</option>
                        </select>
                    </div>
                </div>
                <div class="profile__list" id="saved-books-list">
                    <!-- saved books load here -->
                </div>
            </section>
        </section>
    </main>
</body>
</html>
